<svg viewBox="0 0 1240 710" xmlns="http://www.w3.org/2000/svg" font-family="'Microsoft YaHei','PingFang SC','Segoe UI',sans-serif" role="img">
  <title>2023 H题 信号分离 — 硬件连接结构图(主线:模拟鉴相 + PID)</title>
  <desc>信号源A/B经NE5532加法器得C;C一路经偏置抗混叠LPF进ADC0(PA25)做FFT测频,一路进模拟乘法器;AD9959经软件SPI输出CH0/CH1=A'/B'到重构滤波运放与示波器,CH2/CH3=正交本振LO到乘法器;乘法器(C×LO)经低通留直流、抬偏置1.65V后进ADC1作鉴相电压;固件读电压跑PID微调DDS频率正交锁定;替代方案全数字PLL改为A'+B'引回ADC1。</desc>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/></marker>
    <marker id="apd" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#c2410c"/></marker>
  </defs>
  <rect x="0" y="0" width="1240" height="710" fill="#ffffff"/>
  <text x="620" y="30" font-size="18" font-weight="bold" fill="#0f172a" text-anchor="middle">图一 · 硬件连接结构图(主线:模拟鉴相 + PID)</text>

  <!-- legend -->
  <rect x="24" y="44" width="572" height="150" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="40" y="63" font-size="12" font-weight="bold" fill="#0f172a">引脚 / 说明</text>
  <text x="40" y="82" font-size="11.5" fill="#334155">· ADC 输入 C:PA25(ADC0 通道2)· TIMA0 触发 ADC0 锁 fs</text>
  <text x="40" y="100" font-size="11.5" fill="#334155">· AD9959 软件SPI:SCLK=PA7 · SDIO0=PB2 · CS=PB3 · UPDATE=PA8 · RST=PA9</text>
  <text x="40" y="118" font-size="11.5" fill="#7c3aed">· UART0 遥测→电脑 PA10/11 · UART1 串口屏 PA17/18(本图略)</text>
  <text x="40" y="136" font-size="11.5" fill="#c2410c">· 鉴相:C × 正交本振(CH2/CH3)→ 乘法器 → LPF → 偏置1.65V → ADC1</text>
  <text x="40" y="154" font-size="11.5" fill="#c2410c">   两路鉴相电压 PD_A/PD_B,ADC1 引脚占位 TODO,上板确认</text>
  <text x="40" y="172" font-size="11.5" fill="#64748b">· 替代(全数字PLL):改 A'+B'→ADC1 · 三角波(发挥①)由模拟链生成</text>

  <!-- 信号源 -->
  <rect x="24" y="230" width="142" height="190" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-dasharray="4 3"/>
  <text x="95" y="251" font-size="12" font-weight="bold" fill="#475569" text-anchor="middle">信号源(独立晶振)</text>
  <rect x="39" y="264" width="112" height="58" rx="8" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="95" y="288" font-size="13" fill="#1e293b" text-anchor="middle">信号源 A</text>
  <text x="95" y="306" font-size="11" fill="#64748b" text-anchor="middle">20~100kHz</text>
  <rect x="39" y="344" width="112" height="58" rx="8" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="95" y="368" font-size="13" fill="#1e293b" text-anchor="middle">信号源 B</text>
  <text x="95" y="386" font-size="11" fill="#64748b" text-anchor="middle">5kHz 整数倍</text>

  <!-- 加法器 / C调理 -->
  <rect x="182" y="278" width="120" height="62" rx="8" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="242" y="304" font-size="12.5" fill="#1e293b" text-anchor="middle">NE5532 加法器</text>
  <text x="242" y="324" font-size="11" fill="#64748b" text-anchor="middle">C=A+B 【基本①】</text>
  <rect x="320" y="278" width="120" height="62" rx="8" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="380" y="304" font-size="12.5" fill="#1e293b" text-anchor="middle">C 输入调理</text>
  <text x="380" y="324" font-size="11" fill="#64748b" text-anchor="middle">偏置+抗混叠LPF</text>

  <!-- MCU -->
  <rect x="458" y="200" width="226" height="300" rx="10" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="571" y="220" font-size="12" font-weight="bold" fill="#1d4ed8" text-anchor="middle">MSPM0G3507(SYSOSC→80MHz)</text>
  <rect x="473" y="232" width="196" height="46" rx="8" fill="#e0e7ff" stroke="#6366f1"/>
  <text x="571" y="251" font-size="12" fill="#3730a3" text-anchor="middle">TIMA0 / TIMER_ADC</text>
  <text x="571" y="269" font-size="10.5" fill="#4338ca" text-anchor="middle">触发 ADC0 · 锁 fs</text>
  <rect x="473" y="288" width="196" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="571" y="308" font-size="12" fill="#1e293b" text-anchor="middle">ADC0 通道2 / PA25</text>
  <text x="571" y="326" font-size="10.5" fill="#475569" text-anchor="middle">ADC12+FIFO+DMA · N=1024</text>
  <rect x="473" y="348" width="196" height="52" rx="8" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="571" y="369" font-size="12.5" fill="#1e293b" text-anchor="middle">固件:FFT 测频(粗)</text>
  <text x="571" y="387" font-size="11" fill="#475569" text-anchor="middle">+ PID 闭环(主线)</text>
  <rect x="473" y="410" width="196" height="58" rx="8" fill="#fff7ed" stroke="#c2410c"/>
  <text x="571" y="434" font-size="12" fill="#9a3412" text-anchor="middle">ADC1:读 2 路鉴相电压</text>
  <text x="571" y="452" font-size="10.5" fill="#c2410c" text-anchor="middle">PD_A/PD_B(引脚TODO)</text>

  <!-- AD9959 -->
  <rect x="708" y="222" width="152" height="250" rx="10" fill="#f0fdf4" stroke="#16a34a"/>
  <text x="784" y="242" font-size="12" font-weight="bold" fill="#15803d" text-anchor="middle">AD9959(25M×20=500M)</text>
  <rect x="723" y="252" width="122" height="42" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="784" y="278" font-size="12.5" fill="#1e293b" text-anchor="middle">CH0 → A'</text>
  <rect x="723" y="300" width="122" height="42" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="784" y="326" font-size="12.5" fill="#1e293b" text-anchor="middle">CH1 → B'</text>
  <rect x="723" y="352" width="122" height="42" rx="8" fill="#ffedd5" stroke="#c2410c"/>
  <text x="784" y="378" font-size="11.5" fill="#9a3412" text-anchor="middle">CH2 → 本振 LO_A 90°</text>
  <rect x="723" y="400" width="122" height="42" rx="8" fill="#ffedd5" stroke="#c2410c"/>
  <text x="784" y="426" font-size="11.5" fill="#9a3412" text-anchor="middle">CH3 → 本振 LO_B 90°</text>

  <!-- 重构 / 三角波 / 示波器 -->
  <rect x="884" y="252" width="132" height="58" rx="8" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="950" y="277" font-size="12.5" fill="#1e293b" text-anchor="middle">重构LPF+运放</text>
  <text x="950" y="295" font-size="11" fill="#64748b" text-anchor="middle">A'/B' ≥1Vpp</text>
  <rect x="884" y="322" width="132" height="58" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-dasharray="4 3"/>
  <text x="950" y="346" font-size="12.5" fill="#1e293b" text-anchor="middle">三角波模拟链</text>
  <text x="950" y="364" font-size="11" fill="#64748b" text-anchor="middle">【发挥①】</text>
  <rect x="1048" y="266" width="90" height="96" rx="8" fill="#f1f5f9" stroke="#475569"/>
  <text x="1093" y="308" font-size="12.5" fill="#1e293b" text-anchor="middle">示波器</text>
  <text x="1093" y="326" font-size="10.5" fill="#64748b" text-anchor="middle">同频显示</text>

  <!-- ===== edges (上半) ===== -->
  <path d="M151,293 L182,300" fill="none" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>
  <path d="M151,373 L167,373 L167,322 L182,322" fill="none" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>
  <path d="M302,309 L320,309" fill="none" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>
  <path d="M440,309 L456,309 L456,313 L473,313" fill="none" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>
  <path d="M571,278 L571,288" fill="none" stroke="#6366f1" stroke-width="1.6" marker-end="url(#ah)"/>
  <path d="M571,338 L571,348" fill="none" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>
  <path d="M571,410 L571,400" fill="none" stroke="#c2410c" stroke-width="1.6" marker-end="url(#apd)"/>
  <path d="M669,360 L690,360 L690,263 L708,263" fill="none" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>
  <text x="699" y="280" font-size="10" fill="#334155" text-anchor="middle">软件SPI</text>
  <path d="M845,273 L884,273" fill="none" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>
  <path d="M845,321 L865,321 L865,289 L884,289" fill="none" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>
  <path d="M1016,281 L1032,281 L1032,300 L1048,300" fill="none" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>
  <path d="M1016,351 L1032,351 L1032,330 L1048,330" fill="none" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>
  <path d="M950,310 L950,322" fill="none" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>

  <!-- ===== 模拟鉴相前端(下移, 走线分层) ===== -->
  <path d="M740,586 L740,512 L440,512 L440,439 L473,439" fill="none" stroke="#c2410c" stroke-width="1.7" marker-end="url(#apd)"/>
  <text x="500" y="505" font-size="11" font-weight="bold" fill="#c2410c" text-anchor="middle">鉴相电压 → ADC1</text>
  <path d="M723,373 L700,373 L700,542 L525,542 L525,586" fill="none" stroke="#c2410c" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#apd)"/>
  <text x="618" y="535" font-size="10.5" fill="#c2410c" text-anchor="middle">CH2 本振 LO_A 90°</text>
  <path d="M242,340 L242,616 L460,616" fill="none" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>
  <text x="232" y="476" font-size="10.5" fill="#475569" text-anchor="middle" transform="rotate(-90 232 476)">C 馈鉴相</text>

  <text x="250" y="572" font-size="13" font-weight="bold" fill="#9a3412">模拟鉴相前端 · 主线核心(乘法器鉴相 → PID 正交锁定)</text>
  <rect x="460" y="586" width="130" height="60" rx="8" fill="#ffedd5" stroke="#c2410c"/>
  <text x="525" y="611" font-size="12.5" fill="#9a3412" text-anchor="middle">乘法器 A</text>
  <text x="525" y="629" font-size="11" fill="#c2410c" text-anchor="middle">C × LO_A</text>
  <rect x="612" y="586" width="82" height="60" rx="8" fill="#ffedd5" stroke="#c2410c"/>
  <text x="653" y="611" font-size="12.5" fill="#9a3412" text-anchor="middle">低通 LPF</text>
  <text x="653" y="629" font-size="10.5" fill="#c2410c" text-anchor="middle">去2ω/拍频</text>
  <rect x="716" y="586" width="150" height="60" rx="8" fill="#ffedd5" stroke="#c2410c"/>
  <text x="791" y="611" font-size="12.5" fill="#9a3412" text-anchor="middle">抬偏置 1.65V</text>
  <text x="791" y="629" font-size="10.5" fill="#c2410c" text-anchor="middle">正交零点 → PD_A</text>
  <path d="M590,616 L612,616" fill="none" stroke="#c2410c" stroke-width="1.6" marker-end="url(#apd)"/>
  <path d="M694,616 L716,616" fill="none" stroke="#c2410c" stroke-width="1.6" marker-end="url(#apd)"/>
  <text x="250" y="678" font-size="11.5" fill="#9a3412">B 路同构:C × CH3(LO_B)→ 乘法器B → LPF → 偏置 → ADC1.1(PD_B)</text>
</svg>
